services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medinsight-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MedInsightDb: Host=postgres;Port=5432;Database=medinsight;Username=medinsight;Password=medinsight
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medinsight

  postgres:
    image: postgres:17-alpine
    container_name: medinsight-postgres
    environment:
      POSTGRES_DB: medinsight
      POSTGRES_USER: medinsight
      POSTGRES_PASSWORD: medinsight
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinsight -d medinsight"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medinsight

volumes:
  postgres-data:

networks:
  medinsight:
    driver: bridge
